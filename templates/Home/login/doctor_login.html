<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login</title>
    <link rel="stylesheet" href="../../../static/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <form action="/doctor/login" method="post">

                <h2 class="portal-heading">Doctor Login</h2>

                <div class="field-group">
                    <label class="field-icon">
                        <i class="fa-solid fa-envelope"></i>
                    </label>

                    <input type="email" placeholder="Email Address" class="field-input" name="username" required>
                </div>

                <div class="field-group">
                    <label class="field-icon">
                        <i class="fa-solid fa-lock"></i>
                    </label>

                    <input type="password" placeholder="Password" class="field-input" name="password" required>
                </div>

                <button type="submit" class="portal-button">
                    Login
                </button>

                <div class="account-action">
                    Don't have an account?

                    <a href="/doctor-register" class="register-action">
                        Register Here
                    </a>
                </div>

            </form>
        </div>
    </div>
</body>

</html>
