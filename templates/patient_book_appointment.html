<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/patient_dashboard/patient_book_appointment.css">
</head>
<body>
    <div class="dashboard-layout">
        <div class="d-flex flex-column flex-shrink-0 p-3 text-bg-primary sidebar"> <a href="/"
                class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-black text-decoration-none"> <svg
                    class="bi pe-none me-2" width="40" height="32" aria-hidden="true">
                    <use xlink:href="#bootstrap"></use>
                </svg> <span class="fs-4">Health Care</span> </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                
                <li> <a href="/patient/dashboard" class="nav-link text-black"> <svg class="bi pe-none me-2" width="16" height="16"
                            aria-hidden="true">
                            <use xlink:href="#speedometer2"></use>
                        </svg>
                        Dashboard
                    </a> </li>
                <li> <a href="/patient/book-appointment-page" class="nav-link text-black"> <svg class="bi pe-none me-2" width="16" height="16"
                            aria-hidden="true">
                            <use xlink:href="#table"></use>
                        </svg>
                        Book Appointments
                    </a> </li>
                <li> <a href="/patient/my-appointments-page" class="nav-link text-black"> <svg class="bi pe-none me-2" width="16"
                            height="16" aria-hidden="true">
                            <use xlink:href="#grid"></use>
                        </svg>
                        My appointments
                    </a> </li>
    
            </ul>
            <hr>
            <div class="dropdown"> <a href="#"
                    class="d-flex align-items-center text-black text-decoration-none dropdown-toggle"
                    data-bs-toggle="dropdown" aria-expanded="false"> <img src="https://github.com/mdo.png" alt="" width="32"
                        height="32" class="rounded-circle me-2"> <strong>mdo</strong> </a>
                <ul class="dropdown-menu dropdown-menu-black text-small shadow">
    
                    <li><a class="dropdown-item" href="#">Settings</a></li>
                    <li><a class="dropdown-item" href="/patient/profile-page">Profile</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item" href="/patient/logout">Sign out</a></li>
                </ul>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
        
            <h3 class="page-title">Book Appointment</h3>
        
            <form method="post" action="/patient/appointment">
        
                <!-- Patient Information -->
                <div class="step-card">
                    <h5>Patient Information</h5>
        
                    <div class="row">
                        <div class="col-md-4">
                            <label>Name</label>
                            <input type="text" class="form-control" value="{{ patient.name }}" readonly>
                        </div>
        
                        <div class="col-md-4">
                            <label>Age</label>
                            <input type="text" class="form-control" value="{{ patient.age }}" readonly>
                        </div>
        
                        <div class="col-md-4">
                            <label>Gender</label>
                            <input type="text" class="form-control" value="{{ patient.gender }}" readonly>
                        </div>
                    </div>
                </div>
        
                <!-- Doctor Dropdown -->
                <div class="step-card">
                    <h5>Select Doctor</h5>
        
                    <select name="doctor_id" class="form-select" required>
                        <option value="">-- Select Doctor --</option>
        
                        {% for doctor in doctors %}
                        <option value="{{ doctor.doctor_id }}">
                            Dr. {{ doctor.name }} - {{ doctor.specialization }}
                        </option>
                        {% endfor %}
        
                    </select>
                </div>
        
                <!-- Appointment Details -->
                <div class="step-card">
                    <h5>Appointment Details</h5>
        
                    <div class="row">
        
                        <div class="col-md-4">
                            <label>Date</label>
                            <input type="date" name="appointment_date" class="form-control" required>
                        </div>
        
                        <div class="col-md-4">
                            <label>Start Time</label>
                            <input type="time" name="start_time" class="form-control" required>
                        </div>
        
                        <div class="col-md-4">
                            <label>End Time</label>
                            <input type="time" name="end_time" class="form-control" required>
                        </div>
        
                    </div>
                </div>
        
                <!-- Reason -->
                <div class="step-card">
                    <h5>Reason For Visit</h5>
        
                    <textarea name="reason_for_visit" class="form-control" rows="4" required></textarea>
                </div>
        
                <button type="submit" class="btn btn-primary confirm-btn">
                    Confirm Appointment
                </button>
        
            </form>
        
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
