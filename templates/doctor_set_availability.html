<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Availability</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/doctor_dashboard/doctor_set_availability.css">
</head>
<body>
    <div class="d-flex">
        <div class="d-flex flex-column flex-shrink-0 p-3 text-bg-primary" style="width: 280px;height: 100vh;"> <a href="/"
                class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-black text-decoration-none"> <svg
                    class="bi pe-none me-2" width="40" height="32" aria-hidden="true">
                    <use xlink:href="#bootstrap"></use>
                </svg> <span class="fs-4">Health Care</span> </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item"> <a href="#" class="nav-link active" aria-current="page"> <svg class="bi pe-none me-2"
                            width="16" height="16" aria-hidden="true">
                            <use xlink:href="#home"></use>
                        </svg>
                        Home
                    </a> </li>
                <li> <a href="#" class="nav-link text-black"> <svg class="bi pe-none me-2" width="16" height="16"
                            aria-hidden="true">
                            <use xlink:href="#speedometer2"></use>
                        </svg>
                        Dashboard
                    </a> </li>
                <li> <a href="#" class="nav-link text-black"> <svg class="bi pe-none me-2" width="16" height="16"
                            aria-hidden="true">
                            <use xlink:href="#table"></use>
                        </svg>
                        Book Appointments
                    </a> </li>
                <li> <a href="#" class="nav-link text-black"> <svg class="bi pe-none me-2" width="16" height="16"
                            aria-hidden="true">
                            <use xlink:href="#grid"></use>
                        </svg>
                        My appointments
                    </a> </li>
    
            </ul>
            <hr>
            <div class="dropdown"> <a href="#"
                    class="d-flex align-items-center text-black text-decoration-none dropdown-toggle"
                    data-bs-toggle="dropdown" aria-expanded="false"> <img src="https://github.com/mdo.png" alt="" width="32"
                        height="32" class="rounded-circle me-2"> <strong>mdo</strong> </a>
                <ul class="dropdown-menu dropdown-menu-black text-small shadow">
    
                    <li><a class="dropdown-item" href="#">Settings</a></li>
                    <li><a class="dropdown-item" href="#">Profile</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item" href="#">Sign out</a></li>
                </ul>
            </div>
        </div>

        <div class="main-content">
        
            <!-- HEADER -->
            <div class="page-header mb-4">
                <h3>Set Availability</h3>
                <p>Select date and time range to generate slots automatically</p>
            </div>
        
            <!-- INPUT CARD -->
            <div class="card p-4 mb-4">
        
                <h5 class="mb-3">Create Availability</h5>
        
                <!-- DATE -->
                <label class="form-label">Select Date</label>
                <input type="date" id="date" class="form-control mb-3">
        
                <!-- START TIME -->
                <label class="form-label">Start Time</label>
                <input type="time" id="startTime" class="form-control mb-3">
        
                <!-- END TIME -->
                <label class="form-label">End Time</label>
                <input type="time" id="endTime" class="form-control mb-3">
        
                <button class="btn btn-primary w-100" id="generateSlotsBtn">
                    Generate Slots
                </button>
        
            </div>
        
            <!-- SLOTS DISPLAY -->
            <div class="card p-4">
        
                <h5>Generated Slots</h5>
        
                <div id="slotsContainer" class="slots-container mt-3"></div>
        
            </div>
        
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
